services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9000:9000"

  gateway-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GATEWAY_ADDR: ":8080"
      UPSTREAM_URL: "http://backend:9000"
      REDIS_ADDR: "redis:6379"
      RATE_LIMITER: "token-bucket-redis"
      RATE_LIMIT: "5"
      RATE_LIMIT_WINDOW: "1m"
      BUCKET_CAPACITY: "5"
      GATEWAY_INSTANCE_ID: "gateway-1"
    depends_on:
      - redis
      - backend

  gateway-2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GATEWAY_ADDR: ":8080"
      UPSTREAM_URL: "http://backend:9000"
      REDIS_ADDR: "redis:6379"
      RATE_LIMITER: "token-bucket-redis"
      RATE_LIMIT: "5"
      RATE_LIMIT_WINDOW: "1m"
      BUCKET_CAPACITY: "5"
      GATEWAY_INSTANCE_ID: "gateway-2"
    depends_on:
      - redis
      - backend

  gateway-3:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GATEWAY_ADDR: ":8080"
      UPSTREAM_URL: "http://backend:9000"
      REDIS_ADDR: "redis:6379"
      RATE_LIMITER: "token-bucket-redis"
      RATE_LIMIT: "5"
      RATE_LIMIT_WINDOW: "1m"
      BUCKET_CAPACITY: "5"
      GATEWAY_INSTANCE_ID: "gateway-3"
    depends_on:
      - redis
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-1
      - gateway-2
      - gateway-3

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway-1
      - gateway-2
      - gateway-3

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus